<nav class="bg-black text-white px-6 py-4 flex items-center justify-between">

  <!-- Brand -->
  <a routerLink="/" class="text-2xl font-bold tracking-wide">
    Barber<span class="text-yellow-500">Shop</span>
  </a>

  <!-- Links -->
  <div class="hidden md:flex gap-6 text-sm font-medium text-gray-300">
    <a routerLink="/" class="hover:text-yellow-500 transition">Home</a>
    <a class="hover:text-yellow-500 transition">Services</a>
    <a class="hover:text-yellow-500 transition">Gallery</a>
    <a class="hover:text-yellow-500 transition">Contact</a>
  </div>

  <!-- Right side -->
  <div class="flex items-center gap-4">

    @if (isLoggedIn) {
      <span class="hidden sm:block text-sm text-gray-300">
        Hi, <span class="font-semibold text-yellow-500">{{ currentUser?.username }}</span>
      </span>

      <button (click)="bookNow()"
              class="bg-yellow-500 text-black px-4 py-2 rounded-lg font-semibold hover:bg-yellow-600 transition">
        Book Now
      </button>

      <button (click)="logout()"
              class="text-gray-300 hover:text-red-400 text-sm font-medium transition">
        Logout
      </button>
    } @else {
      <button (click)="login()"
              class="text-gray-300 hover:text-yellow-500 text-sm font-medium transition">
        Login
      </button>

      <button (click)="bookNow()"
              class="bg-yellow-500 text-black px-4 py-2 rounded-lg font-semibold hover:bg-yellow-600 transition">
        Book Now
      </button>
    }

  </div>

</nav>

<router-outlet></router-outlet>
