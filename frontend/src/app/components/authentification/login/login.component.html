<div class="bg-gray-50 min-h-screen font-sans text-gray-900 flex items-center justify-center px-5 py-12">

  <div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <span class="text-yellow-500 font-bold tracking-widest text-sm uppercase block mb-2">Premium Grooming</span>
      <h1 class="text-3xl font-extrabold text-gray-900">Welcome Back</h1>
      <p class="text-gray-500 mt-2 text-sm">Sign in to manage your appointments</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/60 p-8 md:p-10">

      <!-- Error alert -->
      <div *ngIf="errorMessage"
           class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 rounded-2xl px-4 py-3 text-sm">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Username -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-4 flex items-center text-gray-400 pointer-events-none">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </span>
            <input
              formControlName="username"
              type="text"
              placeholder="Enter your username"
              class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-gray-200 bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition-all duration-200"
              [class.border-red-400]="isInvalid('username')"
              [class.bg-red-50]="isInvalid('username')"
            />
          </div>
          <p *ngIf="isInvalid('username')" class="mt-1.5 text-xs text-red-500 pl-1">Username is required.</p>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-4 flex items-center text-gray-400 pointer-events-none">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </span>
            <input
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Enter your password"
              class="w-full pl-11 pr-12 py-3.5 rounded-2xl border border-gray-200 bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition-all duration-200"
              [class.border-red-400]="isInvalid('password')"
              [class.bg-red-50]="isInvalid('password')"
            />
            <!-- Toggle visibility -->
            <button type="button" (click)="showPassword = !showPassword"
                    class="absolute inset-y-0 right-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21" />
              </svg>
            </button>
          </div>
          <p *ngIf="isInvalid('password')" class="mt-1.5 text-xs text-red-500 pl-1">Password is required.</p>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 disabled:bg-yellow-300 disabled:cursor-not-allowed text-black rounded-2xl font-bold shadow-lg hover:shadow-yellow-500/20 active:scale-95 transition-all duration-300 mt-2 flex items-center justify-center gap-2">
          <svg *ngIf="isLoading" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          {{ isLoading ? 'Signing in...' : 'Sign In' }}
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-gray-400 text-xs font-medium">or</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Guest booking -->
      <button (click)="continueAsGuest()"
              class="w-full py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-2xl font-bold active:scale-95 transition-all duration-300">
        Continue as Guest
      </button>
      <!-- Sign up link -->
      <p class="text-center text-sm text-gray-500 mt-5">
        Don't have an account?
        <button (click)="goToSignup()" class="text-yellow-600 font-semibold hover:underline ml-1">Sign up</button>
      </p>

    </div>

    <!-- Back to home -->
    <p class="text-center text-sm text-gray-500 mt-6">
      <a routerLink="/" class="hover:text-yellow-600 font-medium transition-colors">← Back to Home</a>
    </p>

  </div>

</div>
